name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Check tag does not exist
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Run 'node scripts/bump-version.js' first."
            exit 1
          fi

      - name: Validate secrets
        env:
          HAS_VPS_HOST: ${{ secrets.VPS_HOST != '' }}
          HAS_VPS_USER: ${{ secrets.VPS_USER != '' }}
          HAS_VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY != '' }}
        run: |
          MISSING=""
          if [ "$HAS_VPS_HOST" != "true" ]; then MISSING="$MISSING VPS_HOST"; fi
          if [ "$HAS_VPS_USER" != "true" ]; then MISSING="$MISSING VPS_USER"; fi
          if [ "$HAS_VPS_SSH_KEY" != "true" ]; then MISSING="$MISSING VPS_SSH_KEY"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING — See docs/VPS_DEPLOY.md"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
            PORT="${{ secrets.APP_PORT || '3000' }}"
            mkdir -p ~/app
            cd ~/app

            # Capture currently running image for potential rollback
            PREV_IMAGE=""
            if docker compose ps -q app >/dev/null 2>&1; then
              CID=$(docker compose ps -q app || true)
              if [ -n "$CID" ]; then
                PREV_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$CID" 2>/dev/null || true)
              fi
            fi
            echo "Previous image: ${PREV_IMAGE:-<none>}"

            write_compose() {
              local img="$1"
              cat > ~/app/docker-compose.yml << EOF
            services:
              app:
                image: $img
                env_file: $HOME/.env.app
                ports:
                  - "${PORT}:${PORT}"
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:${PORT}/health"]
                  interval: 10s
                  timeout: 5s
                  retries: 3
                  start_period: 10s
            EOF
            }

            write_compose "$IMAGE"
            docker compose pull

            if docker compose up -d --wait; then
              echo "Deploy succeeded."
              docker image prune -f
            else
              echo "::error::Deploy health check failed."
              if [ -n "$PREV_IMAGE" ] && [ "$PREV_IMAGE" != "$IMAGE" ]; then
                echo "Rolling back to $PREV_IMAGE"
                write_compose "$PREV_IMAGE"
                docker compose up -d --wait || echo "::error::Rollback also failed — manual intervention required."
              else
                echo "No previous image available to roll back to."
              fi
              exit 1
            fi

      - name: Clean up old GHCR images
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 10

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
